      window.React = React;
      window.createRoot = createRoot;

    <script type="text/babel">
      const greeting = "";

      function Message() {
        return "Hi- from Message";
      }

      const Message2 = (props) => {
        return (
          <span>
            {props.msg}
            <br />
          </span>
        );
      };

      const section = (
        /* 
        <section>
          <span>Hello</span>

          <span>World</span>
          </section>
         */

        <section>
          {greeting ? greeting : "HEY!"}  {/*  {}  => interpolation     accepts a js function*/}
          {greeting ? <span>{greeting}</span> : <b>No greetings found</b>}
          {Message()}
          {Message2({ msg: "Hello From Message2" })}

          {Message2({ msg: "Hello! This is react props.message" })}  {/* normal way of calling a function with props */}

          {/* The react way*/}
          <Message2 msg="Hello from Message2 with react way of passing props"/>
        </section>
      );

      

      console.log(section);
      const root = document.getElementById("root");
      createRoot(root).render(section);
    </script>
  </body>
